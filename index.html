<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta — 메타인지 실험 보드</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>Meta</h1>
          <p>정적 메타인지 실험 보드</p>
        </div>
      </div>

      <nav class="nav" aria-label="주요 탐색">
        <button class="nav-link active" data-route="dashboard">대시보드</button>
        <button class="nav-link" data-route="session">세션</button>
        <button class="nav-link" data-route="insight">인사이트</button>
        <button class="nav-link" data-route="pattern">패턴</button>
        <button class="nav-link" data-route="archive">아카이브</button>
      </nav>

      <section class="sidebar-card compact">
        <h2>현재 상태</h2>
        <div id="sidebar-status" class="mini-stack"></div>
      </section>

      <section class="sidebar-card compact">
        <h2>빠른 메모</h2>
        <p class="subtle">이 앱은 판정보다 실험에 초점을 둡니다.</p>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Metacognition Experiment Interface</p>
          <h2 id="page-title">대시보드</h2>
        </div>
      </header>

      <!-- ================= DASHBOARD ================= -->
      <section id="dashboard-view" class="view active">

        <div class="grid two-col dashboard-grid">
          <article class="card hero-card">
            <div class="card-head">
              <h3>최근 경향</h3>
            </div>
            <div id="warning-list" class="stack"></div>
          </article>

          <article class="card">
            <div class="card-head">
              <h3>핵심 지표</h3>
            </div>
            <div id="status-cards" class="pill-grid"></div>
          </article>
        </div>

        <div class="grid three-col">
          <article class="card">
            <h3>최근 효과</h3>
            <div id="trend-summary" class="stack"></div>
          </article>

          <article class="card">
            <h3>반복되는 병목</h3>
            <div id="archetype-summary" class="stack"></div>
          </article>

          <article class="card">
            <h3>추천 실험</h3>
            <div id="recommended-actions" class="stack"></div>
          </article>
        </div>

        <!-- 🔥 AI 프롬프트 도우미 -->
        <article class="card">
          <div class="card-head">
            <h3>AI 프롬프트 도우미</h3>
          </div>

          <div class="stack">
            <div id="prompt-mode-row" class="choice-row">
              <button data-prompt-mode="routine" class="choice-chip active">루틴</button>
              <button data-prompt-mode="reflection" class="choice-chip">회고</button>
              <button data-prompt-mode="weekly" class="choice-chip">주간</button>
              <button data-prompt-mode="subject" class="choice-chip">과목</button>
            </div>

            <div class="choice-row">
              <button id="generate-prompt-btn" class="primary-btn">프롬프트 생성</button>
              <button id="copy-prompt-btn" class="ghost-btn">복사</button>
            </div>

            <textarea id="prompt-output" placeholder="여기에 생성됩니다"></textarea>
            <p id="prompt-feedback" class="subtle"></p>
          </div>
        </article>

      </section>

      <!-- ================= SESSION ================= -->
      <section id="session-view" class="view">
        <h2>세션 입력</h2>
      </section>

      <!-- ================= INSIGHT ================= -->
      <section id="insight-view" class="view">
        <h2>인사이트</h2>
      </section>

      <!-- ================= PATTERN ================= -->
      <section id="pattern-view" class="view">
        <h2>패턴 분석</h2>
      </section>

      <!-- ================= ARCHIVE ================= -->
      <section id="archive-view" class="view">
        <h2>아카이브</h2>
      </section>

    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
